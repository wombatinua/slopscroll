services:
  slopscroll:
    container_name: slopscroll
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_COMMIT: "${APP_COMMIT:-unknown}"
    image: slopscroll:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3579}:${APP_PORT:-3579}"
    environment:
      NODE_ENV: production
      APP_HOST: "${APP_HOST:-0.0.0.0}"
      APP_PORT: "${APP_PORT:-3579}"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${DATA_IMAGES_DIR:-./data/images}:/app/data/images
      - ${DATA_VIDEOS_DIR:-./data/videos}:/app/data/videos
    healthcheck:
      test: ["CMD", "node", "-e", "const p=process.env.APP_PORT||'3579';fetch('http://127.0.0.1:'+p+'/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
