services:
  slopscroll:
    container_name: slopscroll
    build:
      context: .
      dockerfile: Dockerfile
    image: slopscroll:latest
    restart: unless-stopped
    ports:
      - "3579:3579"
    environment:
      NODE_ENV: production
      SLOPSCROLL_HOST: 0.0.0.0
      SLOPSCROLL_PORT: 3579
      SLOPSCROLL_DATA_DIR: /app/data
      SLOPSCROLL_SOUNDS_DIR: /app/data/sounds
    volumes:
      - ./data:/app/data
      - ./data/images:/app/data/images
      - ./data/videos:/app/data/videos
      - ./data/sounds:/app/data/sounds
      - ./data/session:/app/data/session
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3579/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
